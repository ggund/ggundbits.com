title: GGundBits
description: Cloud engineering guides, demos, and deep dives
url: "https://ggundbits.com"
baseurl: ""

cloudflare_analytics_token: "a0626baf41084a7299e467657ae44687"
post_feedback_worker_url: ""

remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "air"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache
  - jekyll-remote-theme
  - jekyll-paginate

author:
  name: "GGundBits"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Enterprise cloud and MLOps solutions on AWS — landing zones, migrations, and DevOps automation."
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/ggund"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/gauravgundal/"
    - label: "RSS"
      icon: "fas fa-rss"
      url: "/feed.xml"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

paginate: 10
paginate_path: /page:num/

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

include:
  - _pages

head_scripts:
  - /assets/css/custom.css
